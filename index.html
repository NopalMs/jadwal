<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jadwal Sekolah</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="background-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <main class="container">
    <header class="glass-panel header-panel">
      <div class="date-display">
        <h2 id="current-day">Senin</h2>
        <p id="current-date">1 Januari 2026</p>
      </div>
      <div class="header-controls" style="display: flex; align-items: center; gap: 20px;">
        <div class="clock-display">
          <h1 id="clock">07:00:00</h1>
        </div>
        <button id="theme-toggle" class="glass-btn">🌙</button>
      </div>
    </header>

    <section class="dashboard-grid">
      <div class="glass-panel status-card active-card">
        <h3>Sedang Berlangsung</h3>
        <div class="card-content">
          <div class="subject-icon">📚</div>
          <div class="subject-info">
            <h1 id="current-subject">Memuat...</h1>
            <p id="current-time-range">--:-- - --:--</p>
          </div>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar" id="lesson-progress" style="width: 0%"></div>
        </div>
      </div>

      <div class="glass-panel status-card next-card">
        <h3>Selanjutnya</h3>
        <div class="card-content">
          <div class="subject-icon">⏭️</div>
          <div class="subject-info">
            <h1 id="next-subject">--</h1>
            <p id="time-remaining">-- menit lagi</p>
          </div>
        </div>
      </div>
    </section>

    <section class="glass-panel schedule-section">
      <h3>Jadwal Mingguan</h3>
      <div class="table-responsive">
        <table class="schedule-table">
          <thead>
            <tr>
              <th>Jam Ke</th>
              <th>Waktu</th>
              <th>Sabtu</th>
              <th>Ahad</th>
              <th>Senin</th>
              <th>Selasa</th>
              <th>Rabu</th>
              <th>Kamis</th>
            </tr>
          </thead>
          <tbody id="schedule-body">
            <!-- Rows generated by JS -->
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>

</html>
